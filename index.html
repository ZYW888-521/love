<!DOCTYPE html><br/><html><br/><head><br/><meta charset="utf-8"><br/><title>I Love You</title><br/><style><br/>body {<br/>  margin: 0;<br/>  background: black;<br/>  overflow: hidden;<br/>}<br/>canvas {<br/>  position: absolute;<br/>}<br/>.text {<br/>  position: absolute;<br/>  top: 45%;<br/>  width: 100%;<br/>  text-align: center;<br/>  color: pink;<br/>  font-size: 32px;<br/>  font-weight: bold;<br/>  letter-spacing: 3px;<br/>}<br/></style><br/></head><br/><body><br/><br/><div class="text" id="text"></div><br/><canvas id="c"></canvas><br/><br/><audio autoplay loop><br/>  <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg"><br/></audio><br/><br/><script><br/>var canvas = document.getElementById("c");<br/>var ctx = canvas.getContext("2d");<br/><br/>canvas.width = window.innerWidth;<br/>canvas.height = window.innerHeight;<br/><br/>// <span class="emoji emoji2764"></span>️ 打字机效果<br/>var str = "赵春清我爱你 <span class="emoji emoji2764"></span>️";<br/>var i = 0;<br/>function typing(){<br/>  if(i <= str.length){<br/>    document.getElementById("text").innerHTML = str.substring(0,i++);<br/>    setTimeout(typing,150);<br/>  }<br/>}<br/>typing();<br/><br/>// <span class="emoji emoji2764"></span>️ 心形函数<br/>function heart(t) {<br/>    return {<br/>        x: 16 * Math.pow(Math.sin(t), 3),<br/>        y: -(13 * Math.cos(t) - 5 * Math.cos(2*t)<br/>            - 2 * Math.cos(3*t) - Math.cos(4*t))<br/>    };<br/>}<br/><br/>var scale = 10;<br/>var growing = true;<br/><br/>// <span class="emoji emoji2764"></span>️ 粒子<br/>var particles = [];<br/>for(let i=0;i<100;i++){<br/>  particles.push({<br/>    x: Math.random()*canvas.width,<br/>    y: Math.random()*canvas.height,<br/>    size: Math.random()*2,<br/>    speed: Math.random()*1+0.5<br/>  });<br/>}<br/><br/>function drawParticles(){<br/>  ctx.fillStyle = "rgba(255,192,203,0.7)";<br/>  particles.forEach(p=>{<br/>    ctx.fillRect(p.x,p.y,p.size,p.size);<br/>    p.y += p.speed;<br/>    if(p.y > canvas.height) p.y = 0;<br/>  });<br/>}<br/><br/>// <span class="emoji emoji2764"></span>️ 绘制爱心（带跳动）<br/>function drawHeart(){<br/>    for (var t = 0; t < Math.PI * 2; t += 0.02) {<br/>        var p = heart(t);<br/>        ctx.fillRect(<br/>            canvas.width/2 + p.x * scale,<br/>            canvas.height/2 + p.y * scale,<br/>            2,2<br/>        );<br/>    }<br/>}<br/><br/>function animate(){<br/>  ctx.clearRect(0,0,canvas.width,canvas.height);<br/><br/>  drawParticles();<br/><br/>  ctx.fillStyle = "pink";<br/>  drawHeart();<br/><br/>  // <span class="emoji emoji2764"></span>️ 跳动效果<br/>  if(growing){<br/>    scale += 0.05;<br/>    if(scale > 11) growing = false;<br/>  }else{<br/>    scale -= 0.05;<br/>    if(scale < 9) growing = true;<br/>  }<br/><br/>  requestAnimationFrame(animate);<br/>}<br/><br/>animate();<br/></script><br/><br/></body><br/></html>
