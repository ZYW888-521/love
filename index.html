<!DOCTYPE html><br/><html><br/><head><br/><meta charset="utf-8"><br/><title>I Love You</title><br/><style><br/>body {<br/>  margin: 0;<br/>  background: black;<br/>  overflow: hidden;<br/>}<br/>canvas {<br/>  display: block;<br/>}<br/>.text {<br/>  position: absolute;<br/>  top: 45%;<br/>  width: 100%;<br/>  text-align: center;<br/>  color: pink;<br/>  font-size: 32px;<br/>  font-weight: bold;<br/>}<br/></style><br/></head><br/><body><br/><br/><div class="text" id="text"></div><br/><canvas id="c"></canvas><br/><br/><script><br/>var canvas = document.getElementById("c");<br/>var ctx = canvas.getContext("2d");<br/><br/>function resize(){<br/>  canvas.width = window.innerWidth;<br/>  canvas.height = window.innerHeight;<br/>}<br/>resize();<br/>window.onresize = resize;<br/><br/>// 打字效果<br/>var str = "赵春清我爱你 <span class="emoji emoji2764"></span>️";<br/>var i = 0;<br/>function typing(){<br/>  if(i <= str.length){<br/>    document.getElementById("text").innerHTML = str.substring(0,i++);<br/>    setTimeout(typing,150);<br/>  }<br/>}<br/>typing();<br/><br/>// 心形函数<br/>function heart(t) {<br/>    return {<br/>        x: 16 * Math.pow(Math.sin(t), 3),<br/>        y: -(13 * Math.cos(t) - 5 * Math.cos(2*t)<br/>            - 2 * Math.cos(3*t) - Math.cos(4*t))<br/>    };<br/>}<br/><br/>var scale = 10;<br/>var growing = true;<br/><br/>function draw(){<br/>    ctx.fillStyle = "rgba(0,0,0,0.2)";<br/>    ctx.fillRect(0,0,canvas.width,canvas.height);<br/><br/>    ctx.fillStyle = "pink";<br/><br/>    for (var t = 0; t < Math.PI * 2; t += 0.02) {<br/>        var p = heart(t);<br/>        ctx.fillRect(<br/>            canvas.width/2 + p.x * scale,<br/>            canvas.height/2 + p.y * scale,<br/>            2,2<br/>        );<br/>    }<br/><br/>    if(growing){<br/>      scale += 0.05;<br/>      if(scale > 11) growing = false;<br/>    }else{<br/>      scale -= 0.05;<br/>      if(scale < 9) growing = true;<br/>    }<br/><br/>    requestAnimationFrame(draw);<br/>}<br/><br/>draw();<br/></script><br/><br/></body><br/></html>
